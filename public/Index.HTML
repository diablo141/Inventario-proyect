<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPro | Gestión de Inventario</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-boxes-stacked logo-icon"></i>
                <h2>StockPro</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-view="inventario">
                    <i class="fas fa-list"></i> Inventario
                </a>
                <a href="#" class="nav-item" data-view="ventas">
                    <i class="fas fa-cart-shopping"></i> Registrar Venta
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-nav">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="globalSearch" placeholder="Buscar productos...">
                </div>
                <div class="user-profile">
                    <span id="lowStockAlert" class="notification-badge hidden">
                        <i class="fas fa-bell"></i>
                    </span>
                    <div class="avatar">AD</div>
                </div>
            </header>

            <!-- Dashboard View -->
            <section id="dashboard-view" class="view">
                <div class="header-view">
                    <h1>Resumen de Negocio</h1>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info">
                            <span>Total Productos</span>
                            <h3 id="statTotalProducts">0</h3>
                        </div>
                        <i class="fas fa-box color-1"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <span>Ventas del Día</span>
                            <h3 id="statDailySales">$0.00</h3>
                        </div>
                        <i class="fas fa-dollar-sign color-2"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <span>Bajo Stock</span>
                            <h3 id="statLowStock" class="warning-text">0</h3>
                        </div>
                        <i class="fas fa-exclamation-triangle color-3"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <span>Ganancia Mensual</span>
                            <h3 id="statMonthlyProfit">$0.00</h3>
                        </div>
                        <i class="fas fa-chart-pie color-4"></i>
                    </div>
                </div>

                <div class="charts-container">
                    <div class="chart-box">
                        <h3>Ventas Mensuales</h3>
                        <canvas id="salesChart"></canvas>
                    </div>
                    <div class="recent-activity">
                        <h3>Productos con Poco Stock</h3>
                        <ul id="lowStockList" class="activity-list">
                            <!-- Dinámico -->
                        </ul>
                    </div>
                </div>
            </section>

            <!-- Inventory View -->
            <section id="inventario-view" class="view hidden">
                <div class="header-view">
                    <h1>Gestión de Inventario</h1>
                    <button class="btn-primary" onclick="app.openModal()">
                        <i class="fas fa-plus"></i> Nuevo Producto
                    </button>
                </div>

                <div class="filters-bar">
                    <select id="filterCategory">
                        <option value="all">Todas las Categorías</option>
                        <option value="Electronica">Electrónica</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Ropa">Ropa</option>
                        <option value="Alimentos">Alimentos</option>
                    </select>
                </div>

                <div class="table-container">
                    <table id="inventoryTable">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Formulario -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Producto</h2>
                <span class="close-modal" onclick="app.closeModal()">&times;</span>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="pName" required placeholder="Ej: Monitor Gamer 24'">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="pCategory">
                            <option value="Electronica">Electrónica</option>
                            <option value="Hogar">Hogar</option>
                            <option value="Ropa">Ropa</option>
                            <option value="Alimentos">Alimentos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Precio ($)</label>
                        <input type="number" id="pPrice" step="0.01" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Stock Inicial</label>
                    <input type="number" id="pStock" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="pDesc" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="app.closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
